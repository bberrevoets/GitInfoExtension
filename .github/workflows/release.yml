name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install nbgv
        run: dotnet tool install -g nbgv

      - name: Set stable version
        run: |
          $vj = Get-Content version.json -Raw | ConvertFrom-Json
          $vj.version = $vj.version -replace '-beta$', ''
          $vj | ConvertTo-Json -Depth 10 | Set-Content version.json
          echo "Stripped beta suffix: version is now $($vj.version)"

      - name: Get version
        id: version
        run: |
          $ver = nbgv get-version -v NuGetPackageVersion
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          $semver = nbgv get-version -v SemVer2
          echo "semver=$semver" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore GitInfoExtension/GitInfoExtension.csproj

      - name: Build
        run: dotnet build GitInfoExtension/GitInfoExtension.csproj -c Release --no-restore

      - name: Create git tag
        run: |
          $tag = "v${{ steps.version.outputs.semver }}"
          if (git tag -l $tag) {
            echo "Tag $tag already exists, skipping"
          } else {
            git tag $tag
            git push origin $tag
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.semver }}
          name: v${{ steps.version.outputs.semver }}
          generate_release_notes: true
          files: GitInfoExtension/bin/Release/net8.0-windows8.0/GitInfoExtension.vsix

      - name: Find VsixPublisher
        run: |
          $publisherPath = Get-ChildItem -Path "${env:ProgramFiles}\Microsoft Visual Studio" `
            -Recurse -Filter VsixPublisher.exe -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $publisherPath) {
            throw "VsixPublisher.exe not found on runner"
          }
          echo "Found VsixPublisher at: $publisherPath"
          echo "VSIX_PUBLISHER=$publisherPath" >> $env:GITHUB_ENV

      - name: Publish to VS Marketplace
        run: |
          & $env:VSIX_PUBLISHER publish `
            -payload GitInfoExtension/bin/Release/net8.0-windows8.0/GitInfoExtension.vsix `
            -publishManifest publishManifest.json `
            -personalAccessToken ${{ secrets.VS_MARKETPLACE_PAT }}
